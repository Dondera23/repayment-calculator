<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Mortgage repayment calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <link href="./style.css" rel="stylesheet">
  <script src="./index.js" charset="utf-8" defer></script>
</head>
<body>
  <div class="container">
    <div class="topcard">
      <h1>Mortgage Calculator</h1>
      <a href="" id="clear">Clear All</a>
      <div class="input">
        <h4>Mortgage Amount</h4>
        <div class="input-wrapper">
          <span class="sp left">£</span>
          <input type="text" class="inp">
        </div>
      </div>
      <div class="input">
        <h4>Mortgage Term</h4>
        <div class="input-wrapper">
          <input type="text" class="inp">
          <span class="sp right">years</span>
        </div>
      </div>
      <div class="input">
        <h4>Interest Rate</h4>
        <div class="input-wrapper">
          <input type="text" class="inp">
          <span class="sp right" id="per">%</span>
        </div>
      </div>
      <div class="input4">
        <h4>Mortgage Type</h4>
        <button type="button" class="rad" data-value="repayment">
          <input type="radio" name="mortage-type" value="repayment"id="repayment">Repayment
        </button>
        <button type="button" class="rad" data-value="interest-only">
          <input type="radio" name="mortage-type" value="interest-only" id="interest-only">Interest Only
        </button>
      </div>
      <div class="calbutton">
        <button type="button" data-value="calculate-payment" class="calculate">
          <img src="./assets/images/icon-calculator.svg" id="cal-icon">
          <span>Calculate Repayments</span>
        </button>
      </div>
    </div>
    <div class="bottomcard">
      <img src="./assets/images/illustration-empty.svg" class="bottom-pic">
      <h4 class="result">Results shown here</h4>
      <p class="emptytext">
        Complete the form and click “calculate repayments” to see what your monthly repayments would be.
      </p>
    </div>



    <!-- Empty results start -->
    

    <!-- Empty results end -->

    <!-- Completed results start -->

    <!-- Your results

    Your results are shown below based on the information you provided. 
    To adjust the results, edit the form and click “calculate repayments” again.

    Your monthly repayments

    Total you'll repay over the term -->

    <!-- Completed results end -->
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Divine Chidera</a>.
  </footer>
</body>
</html>
